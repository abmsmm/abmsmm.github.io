<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.6); width: 85%; max-width: 400px; box-sizing: border-box; }
        input { padding: 12px; width: 100%; margin: 15px 0; border: none; border-radius: 6px; background: #2a2a2a; color: white; font-size: 16px; text-align: center; box-sizing: border-box; }
        button { padding: 12px 25px; background: #00adb5; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; box-sizing: border-box; }
        button:active { background: #007a80; }
        .hidden { display: none !important; }
        .panel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .card { background: #2a2a2a; padding: 22px 10px; border-radius: 8px; text-decoration: none; color: #00adb5; font-weight: bold; font-size: 15px; border: 1px solid #383838; transition: 0.2s; display: block; }
        .card:active { background: #333; border-color: #00adb5; }
    </style>
</head>
<body>

    <!-- PASSWORD GATE -->
    <div id="login-box" class="box">
        <h2 style="margin-top:0; color:#00adb5;">Private Access</h2>
        <p style="color: #aaa; font-size: 14px;">Enter your secret password below</p>
        <input type="password" id="pass" placeholder="Password...">
        <br>
        <button onclick="checkPass()">Unlock Panel</button>
    </div>

    <!-- YOUR PRIVATE PANEL -->
    <div id="panel-box" class="box hidden">
        <h2 style="margin-top:0; color:#00adb5;">Abm</h2>
        <p style="color: #aaa; font-size: 14px; margin-bottom:10px;">Welcome back, Admin.</p>
        
        <div class="panel-grid">
            <a href="https://github.io" target="_blank" class="card">Abm site</a>
            <a href="https://github.com" target="_blank" class="card">GitHub</a>
        </div>
    </div>

    <script>
        function checkPass() {
            if (document.getElementById('pass').value === '1234') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('panel-box').classList.remove('hidden');
            } else {
                alert('Access Denied: Incorrect Password');
            }
        }
    </script>
</body>
</html>
